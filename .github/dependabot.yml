version: 2

updates:
  # npm / pnpm dependencies across the whole workspace (root + frontend + backend).
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    # Supply-chain cooldown: never adopt a version until it has been published
    # for at least 7 days. Guards against freshly-published compromised releases.
    cooldown:
      default-days: 7
    groups:
      dev-dependencies:
        dependency-type: development
        update-types: [minor, patch]
      prod-dependencies:
        dependency-type: production
        update-types: [minor, patch]
    ignore:
      # typescript-eslint (and its ts-api-utils dependency) still cap their
      # typescript peer dependency at "<6.1.0" as of typescript-eslint 8.64.0,
      # so a typescript 7.x bump breaks `npm ci` with an ERESOLVE conflict.
      # Drop this once typescript-eslint publishes support for typescript 7.
      - dependency-name: 'typescript'
        versions: ['>=7.0.0']

  # GitHub Actions used by the CI workflows.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
